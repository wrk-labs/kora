name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: verify tag matches VERSION
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: check
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          FILE_VER=$(cat VERSION)
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "ERROR: tag $TAG_VER does not match VERSION file $FILE_VER"
            exit 1
          fi
          echo "tag and VERSION match: $TAG_VER"

  linux-build:
    name: build kora .deb (${{ matrix.arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    container: debian:bullseye-slim   # bullseye gives us the widest glibc
                                      # baseline (2.31). glslc + Vulkan-Headers
                                      # are brought in below since bullseye
                                      # apt is too old for both.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest        # x86_64 native
          - arch: arm64
            runner: ubuntu-24.04-arm     # arm64 native (GitHub-hosted)
    steps:
      - name: install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential git pkg-config \
            libcurl4-openssl-dev libsqlite3-dev libncurses-dev \
            libvulkan-dev patchelf \
            xxd dpkg-dev fakeroot ca-certificates \
            python3 curl

      - name: install cmake
        # Bullseye main has cmake 3.18; shaderc v2026.2 wants >= 3.22.1.
        # Drop in Kitware's official precompiled cmake. Pinned to 3.30.x
        # to avoid cmake 4.x policy changes biting llama.cpp/submodules.
        env:
          CMAKE_VERSION: 3.30.9
        run: |
          ARCH="$(dpkg --print-architecture)"
          case "$ARCH" in
            amd64) CMAKE_ARCH=x86_64 ;;
            arm64) CMAKE_ARCH=aarch64 ;;
            *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-${CMAKE_ARCH}.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local

      - name: build shaderc (provides glslc)
        # Bullseye doesn't ship glslc. Build from source; pinned tag for
        # reproducibility. Mirrors Dockerfile.build.
        env:
          SHADERC_TAG: v2026.2
        run: |
          git clone --depth 1 --branch "$SHADERC_TAG" \
            https://github.com/google/shaderc.git /tmp/shaderc
          cd /tmp/shaderc && ./utils/git-sync-deps
          cmake -S /tmp/shaderc -B /tmp/shaderc/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSHADERC_SKIP_TESTS=ON \
            -DSHADERC_SKIP_EXAMPLES=ON \
            -DSHADERC_SKIP_COPYRIGHT_CHECK=ON \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build /tmp/shaderc/build --target install -j$(nproc)
          rm -rf /tmp/shaderc

      - name: install newer Vulkan-Headers
        # Bullseye's libvulkan-dev is 1.2.162; llama.cpp's vulkan backend
        # needs vk::LayerSettingEXT et al. from Vulkan-Hpp 1.3.275+. Overlay
        # header-only Vulkan-Headers; runtime ABI unaffected (dynamic dispatch).
        env:
          VULKAN_HEADERS_TAG: vulkan-sdk-1.4.341.0
        run: |
          git clone --depth 1 --branch "$VULKAN_HEADERS_TAG" \
            https://github.com/KhronosGroup/Vulkan-Headers.git /tmp/vk-headers
          cmake -S /tmp/vk-headers -B /tmp/vk-headers/build -DCMAKE_INSTALL_PREFIX=/usr
          cmake --install /tmp/vk-headers/build
          rm -rf /tmp/vk-headers

      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: build .deb
        run: make deb

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/*.deb
          retention-days: 1

  cuda-build:
    name: build kora-cuda .deb (amd64)
    needs: verify
    runs-on: ubuntu-latest
    # CUDA only matters on NVIDIA hardware, which is effectively amd64-only
    # for kora's audience. nvcc compiles without a GPU present, so a plain
    # ubuntu-latest runner with the CUDA toolkit container is enough.
    container: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - name: install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config \
            patchelf dpkg-dev fakeroot ca-certificates

      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: build kora-cuda .deb
        run: make cuda-deb
        env:
          CUDA_HOME: /usr/local/cuda

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-cuda-amd64
          path: dist/kora-cuda_*.deb
          retention-days: 1

  macos-build:
    name: build darwin tarball (${{ matrix.arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14            # Apple Silicon only; Intel runners deprecated
    steps:
      - name: install build deps
        # kora's Makefile prefers Homebrew ncurses on Darwin (mouse v2 +
        # wide-char). cmake, sqlite3, libcurl, xxd are pre-installed on
        # macos-14 runners.
        run: brew install ncurses

      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: build
        # LUADIR is baked into the binary at compile time; point it at the
        # eventual Homebrew arm64 install location so kora can find lua/core
        # at runtime via the standard /opt/homebrew prefix.
        run: make LUADIR=/opt/homebrew/share/kora/lua
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: package tarball
        # Flat tarball (binaries + lua/core/ + LICENSE at root). Brew's
        # def install copies files into the prefix directly.
        run: |
          VER=$(cat VERSION)
          ARCH=${{ matrix.arch }}
          mkdir -p dist
          tar -czf "dist/kora-${VER}-darwin-${ARCH}.tar.gz" \
              kora llama-server lua/core LICENSE
          ls -la dist/

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: dist/*.tar.gz
          retention-days: 1

  release:
    name: publish github release
    needs: [linux-build, cuda-build, macos-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.tar.gz
          generate_release_notes: true
